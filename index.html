<!DOCTYPE html>
<html>
<head>
  <title>Attendance Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 340px;
      padding: 25px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
    }

    .date-box {
      background: #f1f1f1;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .status-buttons button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 90px;
      font-weight: bold;
      opacity: 0.85;
      transition: 0.2s;
    }

    .status-buttons button:hover {
      transform: scale(1.05);
    }

    .status-buttons button.active {
      border: 2px solid black;
      opacity: 1;
    }

    .present { background: #4CAF50; color: white; }
    .absent { background: #f44336; color: white; }
    .holiday { background: #ff9800; color: white; }

    input {
      width: 92%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 12px;
      outline: none;
    }

    input:focus {
      border-color: #667eea;
    }

    button.submit {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button.submit:hover {
      background: #5a67d8;
    }

    #msg {
      margin-top: 12px;
      font-size: 14px;
      font-weight: bold;
    }

    .status-text {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2 id="welcome"></h2>

  <div class="date-box" id="dateBox"></div>

  <div class="status-buttons">
    <button class="present" onclick="setStatus('Present', this)">Present</button>
    <button class="absent" onclick="setStatus('Absent', this)">Absent</button>
    <button class="holiday" onclick="setStatus('Holiday', this)">Holiday</button>
  </div>

  <input type="text" id="remark" placeholder="Add remark (optional)">

  <button class="submit" id="submitBtn" onclick="submitAttendance()">Submit</button>

  <p class="status-text">Today's Status: <span id="currentStatus">Not marked</span></p>

  <p id="msg"></p>

</div>

<script>

  const name = "Subhajit Das";
  let selectedStatus = "";

  const today = new Date();
  const date = today.toLocaleDateString();
  const day = today.toLocaleDateString('en-US', { weekday: 'long' });

  document.getElementById("welcome").innerText =
    `👋 Welcome, ${name}`;

  document.getElementById("dateBox").innerText =
    `📅 ${day}, ${date}`;

  function setStatus(status, btn) {
    selectedStatus = status;

    document.querySelectorAll(".status-buttons button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    document.getElementById("currentStatus").innerText = status;
  }

  function submitAttendance() {

    if (!selectedStatus) {
      document.getElementById("msg").innerText = "⚠️ Please select status";
      return;
    }

    const remark = document.getElementById("remark").value;
    const button = document.getElementById("submitBtn");

    button.innerText = "Saving...";
    button.disabled = true;

    const url = `https://script.google.com/macros/s/AKfycbzpZ_v23oPRxyhG8twFed2_wc9UnikCjCUddRa0Ssa5kVTmEoViku93GV80Rq9bRaGy/exec?name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}&day=${encodeURIComponent(day)}&status=${encodeURIComponent(selectedStatus)}&remark=${encodeURIComponent(remark)}`;

    fetch(url)
      .then(res => res.text())
      .then(data => {
        if (data === "success") {
          document.getElementById("msg").innerText = "✅ Attendance Saved!";
          document.getElementById("remark").value = "";
        } else {
          document.getElementById("msg").innerText = "❌ " + data;
        }

        button.innerText = "Submit";
        button.disabled = false;
      })
      .catch(err => {
        document.getElementById("msg").innerText = "❌ Network error";
        console.log(err);

        button.innerText = "Submit";
        button.disabled = false;
      });
  }

</script>

</body>
</html>
