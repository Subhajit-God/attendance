<!DOCTYPE html>
<html>
<head>
  <title>Attendance Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 340px;
      padding: 20px;
      margin-top: 40px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .date-box {
      background: #eee;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .status-buttons button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .active { border: 2px solid black; }

    .present { background: green; color: white; }
    .absent { background: red; color: white; }
    .holiday { background: orange; color: white; }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    button.submit {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      background: #667eea;
      color: white;
      border: none;
    }

    table {
      margin-top: 20px;
      width: 340px;
      background: white;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container">

  <h2 id="welcome"></h2>
  <div class="date-box" id="dateBox"></div>

  <div class="status-buttons">
    <button class="present" onclick="setStatus('Present', this)">Present</button>
    <button class="absent" onclick="setStatus('Absent', this)">Absent</button>
    <button class="holiday" onclick="setStatus('Holiday', this)">Holiday</button>
  </div>

  <input id="remark" placeholder="Remark (optional)">
  <button class="submit" onclick="submitAttendance()">Submit</button>

  <p id="msg"></p>

</div>

<!-- 📊 HISTORY TABLE -->
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Day</th>
      <th>Status</th>
      <th>Remark</th>
    </tr>
  </thead>
  <tbody id="historyTable"></tbody>
</table>

<script>

const name = "Subhajit Das";
const scriptURL = "https://script.google.com/macros/s/AKfycbz-_IDiCQ7AvU9evIvMFDGku5pBxxELu10vi-RhB2cUnl667kbzUcu7-GSQXIBg1Ca2/exec";

let selectedStatus = "";

const today = new Date();
const date = today.toLocaleDateString();
const day = today.toLocaleDateString('en-US', { weekday: 'long' });

document.getElementById("welcome").innerText = `Welcome, ${name}`;
document.getElementById("dateBox").innerText = `${day}, ${date}`;

function setStatus(status, btn) {
  selectedStatus = status;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function submitAttendance() {

  if (!selectedStatus) {
    document.getElementById("msg").innerText = "Select status!";
    return;
  }

  const remark = document.getElementById("remark").value;

  const url = `${scriptURL}?action=add&name=${name}&date=${date}&day=${day}&status=${selectedStatus}&remark=${remark}`;

  fetch(url)
    .then(res => res.text())
    .then(data => {

      if (data === "duplicate") {
        document.getElementById("msg").innerText = "⚠️ Already marked today!";
      } 
      else if (data === "success") {
        document.getElementById("msg").innerText = "✅ Saved!";
        loadHistory();
      }

    });
}

// 📊 LOAD HISTORY
function loadHistory() {

  fetch(`${scriptURL}?action=get`)
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.forEach(row => {
        html += `
          <tr>
            <td>${row.date}</td>
            <td>${row.day}</td>
            <td>${row.status}</td>
            <td>${row.remark}</td>
          </tr>
        `;
      });

      document.getElementById("historyTable").innerHTML = html;
    });
}

// Load on start
loadHistory();

</script>

</body>
</html>
